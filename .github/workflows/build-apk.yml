name: Build Breeze APK

on:
  push:
    branches: [main, master]
    tags: ['v*']          # ← triggers the release job on e.g. git tag v1.0.0
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  test:
    name: 🧪 Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm install --legacy-peer-deps
      - run: npm test

  build-apk:
    name: 🤖 Build APK
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept SDK licenses
        run: yes | sdkmanager --licenses || true

      - name: Install Android platforms
        run: sdkmanager "build-tools;34.0.0" "platforms;android-34" "platform-tools"

      - name: Install npm dependencies
        run: npm install --legacy-peer-deps

      - name: Add Android platform
        run: npx cap add android

      - name: Patch AndroidManifest
        run: node patch-android.js

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('android/**/*.gradle*','android/**/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon --stacktrace
        env:
          ANDROID_HOME: ${{ env.ANDROID_SDK_ROOT }}

      - name: Collect APK
        run: |
          mkdir -p release
          APK=$(find android -name "*.apk" -not -path "*/intermediates/*" | head -1)
          echo "APK: $APK"
          cp "$APK" "release/breeze-v2-${{ github.run_number }}.apk"
          ls -lh release/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: breeze-apk-${{ github.run_number }}
          path: release/*.apk
          retention-days: 30

      - name: Summary
        run: |
          echo "## 🍃 Breeze APK — Build #${{ github.run_number }}" >> $GITHUB_STEP_SUMMARY
          echo "| | |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Status | ✅ |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY

  release:
    name: 🚀 Release
    runs-on: ubuntu-latest
    needs: build-apk
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: breeze-apk-${{ github.run_number }}
          path: release/
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "Breeze ${{ github.ref_name }}"
          body: |
            ## 🍃 Breeze ${{ github.ref_name }}
            ### Install
            1. Download the APK below
            2. Enable **Install unknown apps** in Android Settings
            3. Open APK to install
          files: release/*.apk
