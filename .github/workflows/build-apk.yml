name: Build Breeze APK

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  # ─────────────────────────────────────────────────────
  # Job 1 — Run tests
  # ─────────────────────────────────────────────────────
  test:
    name: 🧪 Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          # No cache — avoids "lock file not found" error

      - name: Install dependencies
        run: npm install

      - name: Run tests
        run: npm test

  # ─────────────────────────────────────────────────────
  # Job 2 — Build the Android APK
  # ─────────────────────────────────────────────────────
  build-apk:
    name: 🤖 Build APK
    runs-on: ubuntu-latest
    needs: test

    steps:
      # ── Checkout ──────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Java 17 (required by modern Gradle) ───────────
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # ── Node 20 ───────────────────────────────────────
      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          # cache: 'npm' omitted — requires package-lock.json to already exist

      # ── Android SDK ───────────────────────────────────
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android SDK licenses
        run: yes | sdkmanager --licenses || true

      - name: Install Android build tools
        run: sdkmanager "build-tools;34.0.0" "platforms;android-34" "platform-tools"

      # ── Node deps ─────────────────────────────────────
      - name: Install npm dependencies
        run: npm install
        # Using npm install (not npm ci) — works with or without a lock file

      # ── Capacitor: add & sync Android platform ────────
      - name: Add Android platform
        run: npx cap add android

      - name: Sync web assets to Android
        run: npx cap sync android

      # ── Gradle cache ──────────────────────────────────
      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('android/**/*.gradle*', 'android/**/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      # ── Make gradlew executable ───────────────────────
      - name: Make gradlew executable
        run: chmod +x android/gradlew

      # ── Build debug APK ───────────────────────────────
      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon --stacktrace
        env:
          ANDROID_HOME: ${{ env.ANDROID_SDK_ROOT }}

      # ── Rename APK ────────────────────────────────────
      - name: Rename APK with version info
        run: |
          mkdir -p release
          APK_PATH=$(find android -name "*.apk" | head -1)
          echo "Found APK: $APK_PATH"
          cp "$APK_PATH" release/breeze-debug-${{ github.sha }}.apk
          ls -lh release/

      # ── Upload APK artifact ───────────────────────────
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: breeze-apk-${{ github.run_number }}
          path: release/*.apk
          retention-days: 30

      # ── Print summary ─────────────────────────────────
      - name: Build summary
        run: |
          echo "## 🍃 Breeze APK Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Build | #${{ github.run_number }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Branch | ${{ github.ref_name }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Status | ✅ Success |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "📦 Download the APK from the **Artifacts** section of this run." >> $GITHUB_STEP_SUMMARY

  # ─────────────────────────────────────────────────────
  # Job 3 — Release APK on version tags (e.g. v1.0.0)
  # ─────────────────────────────────────────────────────
  release:
    name: 🚀 GitHub Release
    runs-on: ubuntu-latest
    needs: build-apk
    if: startsWith(github.ref, 'refs/tags/v')

    permissions:
      contents: write

    steps:
      - name: Download APK artifact
        uses: actions/download-artifact@v4
        with:
          name: breeze-apk-${{ github.run_number }}
          path: release/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "Breeze ${{ github.ref_name }}"
          body: |
            ## 🍃 Breeze ${{ github.ref_name }}

            ### Install
            1. Download `breeze-debug-*.apk` below
            2. Enable **Install unknown apps** in Android settings
            3. Open the APK to install

            ### What's new
            See commit history for changes.
          files: release/*.apk
          draft: false
          prerelease: false
